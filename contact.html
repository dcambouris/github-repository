<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Cambouris - Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Back</a></li>
            <li><a href="contact.html" class="hidden-link"></a></li>
        </ul>
    </nav>
    <main>
        <section id="contact">
            <h2>Contact Me!</h2>
            <p>Please provide your information below</p>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" class="input-field" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" class="input-field" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" class="input-field" rows="4" required></textarea>
                <button type="submit" class="submit-button">Send Message</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 David Cambouris. All rights reserved.</p>
    </footer>
</body>
</html>
